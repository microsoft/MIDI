- stage: BuildInstaller
  displayName: 'Build Installer'
  dependsOn:
  - BuildAppSDK
  - BuildToolsAndTests
  - BuildUserApplications
  jobs:
  - job: CopySharedAssets
    displayName: 'Copy Shared Assets'
    steps:
    - checkout: self

    - task: PowerShell@2
      displayName: 'Copy Design Assets to Staging'
      inputs:
        targetType: 'inline'
        script: |
          $designSrc = "$(Build.SourcesDirectory)\design"
          $assetsDest = "$(Build.SourcesDirectory)\build\staging\Assets"

          New-Item -ItemType Directory -Force -Path "$assetsDest\Transports" | Out-Null
          New-Item -ItemType Directory -Force -Path "$assetsDest\Endpoints" | Out-Null

          # Copy transport icons
          $transportIcons = @("APPPUB-small.svg", "BLE10-small.svg", "DIAG-small.svg", "KSA-small.svg", "KS-small.svg", "LOOP-small.svg", "NET2UDP-small.svg", "BLOOP-small.svg")
          foreach ($icon in $transportIcons) {
            Copy-Item "$designSrc\$icon" "$assetsDest\Transports\" -Force
          }

          # Copy endpoint icons
          $endpointIcons = @("default-small.svg", "default-apppub-small.svg", "default-ble10-small.svg", "default-diag-small.svg", "default-ksa-small.svg", "default-ks-small.svg", "default-loop-small.svg", "default-bloop-small.svg", "default-net2udp-small.svg")
          foreach ($icon in $endpointIcons) {
            Copy-Item "$designSrc\$icon" "$assetsDest\Endpoints\" -Force
          }

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Shared Assets'
      inputs:
        targetPath: '$(Build.SourcesDirectory)\build\staging\Assets'
        artifact: 'SharedAssets'

  - job: BuildSDKInstaller
    displayName: 'Build SDK Runtime Installer'
    dependsOn: CopySharedAssets
    strategy:
      matrix:
        x64:
          BuildPlatform: 'x64'
        Arm64:
          BuildPlatform: 'Arm64'
    steps:
    - checkout: self

    - task: DownloadPipelineArtifact@2
      displayName: 'Download All Artifacts'
      inputs:
        downloadType: 'specific'
        downloadPath: '$(Build.SourcesDirectory)\build'

    - task: PowerShell@2
      displayName: 'Generate Bundle Info Include File'
      inputs:
        targetType: 'inline'
        script: |
          $bundleInfoFile = "$(Build.SourcesDirectory)\build\staging\version\BundleInfo.wxi"
          $content = @"
<Include>
  <?define SetupVersionName="$(VersionName) $(BuildPlatform)" ?>
  <?define SetupVersionNumber="$(BuildVersionFullString)" ?>
  <?define MidiSdkAndToolsVersion="$(BuildVersionFullString)" ?>
</Include>
"@
          New-Item -ItemType Directory -Force -Path (Split-Path $bundleInfoFile) | Out-Null
          Set-Content -Path $bundleInfoFile -Value $content

    - task: MSBuild@1
      displayName: 'Build Setup Bundle ($(BuildPlatform))'
      inputs:
        solution: '$(Build.SourcesDirectory)\src\app-sdk\sdk-runtime-installer\midi-services-app-sdk-runtime-setup.sln'
        platform: '$(BuildPlatform)'
        configuration: '$(BuildConfiguration)'
        msbuildArchitecture: 'x64'
        msbuildArguments: >
          /t:Clean;Rebuild
          /p:VersionPrefix=$(BuildVersionMajor).$(BuildVersionMinor).$(BuildVersionPatch)
          /p:Version=$(BuildVersionFileFullString)
          /p:FileVersion=$(BuildVersionFileFullString)
          /m
          /v:$(BuildVerbosity)

    # TODO: Configure code signing for the installer executable
    # WiX installers should be signed after they are built
    # Uncomment and configure the following task to sign the installer
    # - task: AzureSignTool@3
    #   displayName: 'Sign Installer Executable ($(BuildPlatform))'
    #   inputs:
    #     ConnectedServiceName: 'YourAzureServiceConnection'
    #     KeyVaultUrl: 'https://yourkeyvault.vault.azure.net/'
    #     CertificateName: '$(SigningCertificateName)'
    #     SignedFilePath: |
    #       $(Build.SourcesDirectory)\src\app-sdk\sdk-runtime-installer\main-bundle\bin\$(BuildPlatform)\$(BuildConfiguration)\WindowsMidiServicesSdkRuntimeSetup.exe
    #     TimeStampServer: '$(SigningTimeStampServer)'
    #     FileDigest: 'SHA256'
    #     TimeStampDigest: 'SHA256'
    #     Description: '$(SigningDescription) - Installer'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Installer'
      inputs:
        targetPath: '$(Build.SourcesDirectory)\src\app-sdk\sdk-runtime-installer\main-bundle\bin\$(BuildPlatform)\$(BuildConfiguration)\WindowsMidiServicesSdkRuntimeSetup.exe'
        artifact: 'Installer-$(BuildPlatform)'

- stage: PublishRelease
  displayName: 'Publish Release Artifacts'
  dependsOn:
  - BuildInstaller
  condition: succeeded()
  jobs:
  - job: PublishArtifacts
    displayName: 'Publish Release Artifacts'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download All Build Artifacts'
      inputs:
        downloadType: 'specific'
        downloadPath: '$(Build.ArtifactStagingDirectory)'

    - task: PowerShell@2
      displayName: 'Organize Release Files'
      inputs:
        targetType: 'inline'
        script: |
          $timestamp = Get-Date -Format "yyyy-MM-dd HH-mm-ss"
          $releaseName = "$(VersionName) ($timestamp)"
          $releaseDir = "$(Build.ArtifactStagingDirectory)\Release\$releaseName"

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          # Copy NuGet package
          Get-ChildItem "$(Build.ArtifactStagingDirectory)\NuGetPackage\*.nupkg" | Copy-Item -Destination $releaseDir

          # Rename and copy installers
          Get-ChildItem "$(Build.ArtifactStagingDirectory)\Installer-*\*.exe" | ForEach-Object {
            $platform = if ($_.Directory.Name -match "x64") { "x64" } else { "arm64" }
            $newName = "Windows MIDI Services (SDK Runtime and Tools) $(BuildVersionFullString)-$platform.exe"
            Copy-Item $_.FullName "$releaseDir\$newName"
          }

          Write-Host "Release artifacts organized in: $releaseDir"

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Release Build Artifacts'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)\Release'
        artifactName: 'Release'
        publishLocation: 'Container'

    - task: PowerShell@2
      displayName: 'Display Build Summary'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "======================================"
          Write-Host "Build Summary"
          Write-Host "======================================"
          Write-Host "Version: $(BuildVersionFullString)"
          Write-Host "NuGet Package: $(NugetFullPackageIdWithVersion)"
          Write-Host "Build Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host "======================================"
          Write-Host ""
          Write-Host "Built Artifacts:"
          Write-Host "  - NuGet Package: $(NugetFullPackageIdWithVersion).nupkg"
          Write-Host "  - SDK Runtime Installer (x64)"
          Write-Host "  - SDK Runtime Installer (Arm64)"
          Write-Host "  - Console App (x64, Arm64)"
          Write-Host "  - Settings App (x64)"
          Write-Host "  - PowerShell Module (x64, Arm64)"
          Write-Host "======================================"
