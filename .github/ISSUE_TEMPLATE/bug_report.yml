name: "🕷️ Bug Report"
description: File a bug report not related to endpoint naming or online documentation
type: Bug
title: "[BUG]: "
labels:
  - "bug :lady_beetle:"
  - "needs triage :ambulance:"
assignees: ["Psychlist1972"]
projects: microsoft/339

body:
- type: markdown
  attributes:
    value: Thank you for filing a bug report for Windows MIDI Services. Please be sure to [search for existing issues](https://github.com/microsoft/MIDI/labels/bug%20%3Alady_beetle%3A) before filing a new bug. If you are a user and not a developer, and are seeking support, please go to the Discord server https://aka.ms/mididiscord. If you are not up to date with your Windows Updates, we recommend you do that first. If you have uninstalled Windows Updates, we recommend you fix that situation first.

- type: checkboxes
  id: Steps Completed
  description: Please select all the steps you have completed prior to filling out this issue form
  options:
  - label: I have searched this repo for existing issues to confirm this is not a duplicate
  - label: I have confirmed through a simple app like Pocket MIDI or midi1monitor that the issue reproduces
  - label: "I agree to follow this project's Code of Conduct"

- type: input
  id: windows-version
  attributes:
    label: Windows Version
    description: In Windows Settings > System > About. For Insider builds, this is at the bottom right of the screen. Example 27788.rs_prerelease
    required: true

- type: checkboxes
  id: bug-type
  attributes:
    label: Type of bug
    description: How would you classify this bug report?
    options:
      - label: "Windows doesn't recognize MIDI device (doesn't show in device manager)"
      - label: "Application doesn't recognize MIDI device"
      - label: Cannot update firmware on MIDI device (specify device, app, and firmware info)
      - label: Cannot send or receive messages with MIDI 1.0 device
      - label: Cannot send or receive messages with MIDI 2.0 device
      - label: MIDI messages corrupted
      - label: Application not working as expected
      - label: Performance not as expected
      - label: Localization issue (incorrect or missing language for Windows running something other than en-US)
      - label: General application crash or hang
      - label: MIDI Service crash or hang requiring Windows reboot
      - label: "Windows bugcheck / BSOD (please include device id from Windows Settings About page)"
      - label: Other or Unsure (please indicate in additional notes section below)

- type: checkboxes
  id: bug-location
  attributes:
    label: Location
    description: Where did you discover this bug?
    options:
      - label: Application using WinMM MIDI 1.0 (Classic API). Name provided below.
      - label: Application using WinRT MIDI 1.0 (Windows 10 MIDI). Name provided below.
      - label: Application using Windows MIDI Services SDK (MIDI 2.0). Name provided below.
      - label: "Other app/DAW/tool. Not sure about which API or SDK it uses. Name provided below."
      - label: Windows MIDI Services tools like MIDI Settings, Console, etc.
      - label: Directly in Windows MIDI Services SDK (for Developers only, please provide repro code)
      - label: General Windows shell (Device Manager, Settings, Services, etc.). Name provided below.
      - label: "Windows MIDI 2.0 Class Driver (usbmidi2-acx)"
      - label: "Windows MIDI 1.0 Class Driver (usbaudio)"
      - label: Vendor-provided MIDI driver (please provide details below)
      - label: Other or Unsure (please indicate in additional notes section below)

- type: input
  id: app-name
  attributes:
    label: Application Name
    description: Name of the application where you noticed the error, if applicable
  validations:
    required: false

- type: input
  id: midi-device-name
  attributes:
    label: MIDI Device Name
    description: Name of the MIDI device (or virtual device provider) used
  validations:
    required: false

- type: textarea
  id: mididiag-output
  attributes:
    label: Output from the MIDI Diagnostics Tool
    description: Use the MIDI settings app from https://aka.ms/midi, open the MIDI Settings app, and go to the troubleshooting page. Capture the resulting MIDI system information and paste the entire text here.
    placeholder: mididiag output
  validations:
    required: true
    
- type: textarea
  id: repro-steps
  attributes:
    label: Steps to reproduce
    description: Please include screenshots when possible
    placeholder: Detailed steps to reproduce the bug or issue
  validations:
    required: true

- type: textarea
  id: expected-behavior
  attributes:
    label: Expected behavior            
    placeholder: What were you expecting to have happen?
  validations:
    required: false

- type: textarea
  id: additional-notes
  attributes:
    label: Additional notes
    description: Any additional notes or information which may be relevant
    placeholder: Any additional notes or information which may be relevant
  validations:
    required: false
